// ─── Daylight + address helpers ───
function daylightHours(lat, doy) {
  const phi = lat * Math.PI / 180;
  const decl = 23.44 * Math.PI / 180 * Math.sin(2 * Math.PI * (284 + doy) / 365);
  const cosH = -Math.tan(phi) * Math.tan(decl);
  if (cosH > 1) return 0;
  if (cosH < -1) return 24;
  return 2 * Math.acos(cosH) * 180 / Math.PI / 15;
}
function formatHours(h) {
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  return `${hh}h ${String(mm).padStart(2,'0')}m`;
}
async function lookupAddress(address) {
  const result = { success: false };
  try {
    const geoResp = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`, { headers: { 'Accept-Language': 'en' } });
    const geoData = await geoResp.json();
    if (!geoData?.length) throw new Error('Address not found');
    const geo = geoData[0];
    result.geo = { lat: parseFloat(geo.lat), lon: parseFloat(geo.lon), displayName: geo.display_name, type: geo.type };
    try {
      const aqResp = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${result.geo.lat}&longitude=${result.geo.lon}&current=pm2_5,nitrogen_dioxide,european_aqi`);
      if (aqResp.ok) {
        const aqData = await aqResp.json();
        result.air = { pm25: aqData.current?.pm2_5, no2: aqData.current?.nitrogen_dioxide, aqi: aqData.current?.european_aqi };
      }
    } catch (e) {}
    try {
      const mResp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${result.geo.lat}&longitude=${result.geo.lon}&current=temperature_2m`);
      if (mResp.ok) {
        const mData = await mResp.json();
        if (mData.elevation != null) result.place = { elevation: Math.round(mData.elevation) };
      }
    } catch (e) {}
    const today = new Date();
    const yearStart = new Date(today.getFullYear(), 0, 0);
    const doy = Math.floor((today - yearStart) / 86400000);
    const longest = daylightHours(result.geo.lat, 172);
    const shortest = daylightHours(result.geo.lat, 355);
    result.place = result.place || {};
    result.place.daylight = { today: daylightHours(result.geo.lat, doy), longest, shortest, variability: longest - shortest };
    const placeType = (result.geo.type || '').toLowerCase();
    const pm25 = result.air?.pm25;
    let context = 'suburban', source = 'Default classification';
    if (pm25 != null && pm25 > 25) { context = 'urban_high'; source = `PM2.5 = ${pm25.toFixed(1)} µg/m³`; }
    else if (pm25 != null && pm25 > 12) { context = 'urban_medium'; source = `PM2.5 = ${pm25.toFixed(1)} µg/m³`; }
    else if (['city','town'].includes(placeType)) { context = 'urban_medium'; source = `Classified as ${placeType}`; }
    else if (['village','hamlet','isolated_dwelling'].includes(placeType)) { context = 'rural'; source = `Classified as ${placeType}`; }
    result.classification = { context, source };
    result.success = true;
  } catch (e) { result.error = e.message; }
  return result;
}

function App() {
  const [lang, setLang] = useState(() => {
    try { return localStorage.getItem('rens_lang') || 'en'; } catch (e) { return 'en'; }
  });
  useEffect(() => {
    try { localStorage.setItem('rens_lang', lang); } catch (e) {}
  }, [lang]);
  const [authed, setAuthed] = useState(() => {
    try { return sessionStorage.getItem('valEvoAuth') === 'yes'; } catch (e) { return false; }
  });
  const t = makeT(lang);
  const signIn = () => { setAuthed(true); try { sessionStorage.setItem('valEvoAuth', 'yes'); } catch (e) {} };
  const signOut = () => { setAuthed(false); try { sessionStorage.removeItem('valEvoAuth'); } catch (e) {} };

  return authed
    ? <Portal t={t} lang={lang} setLang={setLang} onSignOut={signOut} />
    : <Gate t={t} lang={lang} setLang={setLang} onSuccess={signIn} />;
}

// ════════════════════════════════════════════════════════════════
// ASSESSMENT — 4 steps. Step 4 = score + Vallat intake + submit.
// ════════════════════════════════════════════════════════════════
function Assessment({ t, lang, setLang, onClose }) {
  const [address, setAddress] = useState('');
  const [lookup, setLookup] = useState({ loading: false, result: null });
  const [step, setStep] = useState(1);
  const [inputs, setInputs] = useState({
    locationContext: 'suburban', propertyType: 'new_build', propertySize: 350, occupantMaxAge: 50,
    movementFrequency: 'occasional', thermalPractice: 'none', sleepConcerns: false,
    treatmentInterest: 'moderate', biohackingInterest: 'low', medicalPartnership: false,
    conciergeInterest: false, cvHistory: 'none', email: '',
    elevation: null, daylightVariability: null,
    name: '', vallatReference: '', propertyRegion: 'Geneva', phone: '',
    consultationWindow: 'Within 4 weeks', notes: '',
  });
  const update = (k, v) => setInputs(p => ({ ...p, [k]: v }));
  const [submitState, setSubmitState] = useState({ status: 'idle' });

  async function runLookup() {
    if (!address.trim()) return;
    setLookup({ loading: true, result: null });
    const r = await lookupAddress(address.trim());
    setLookup({ loading: false, result: r });
    if (r.success) {
      update('locationContext', r.classification.context);
      if (r.place?.elevation != null) update('elevation', r.place.elevation);
      if (r.place?.daylight) update('daylightVariability', r.place.daylight.variability);
    }
  }

  const domainScores = useMemo(() => {
    const ctx = inputs.locationContext;
    const build = inputs.propertyType;
    const size = inputs.propertySize;
    const age = inputs.occupantMaxAge;
    const cv = inputs.cvHistory;
    const move = inputs.movementFrequency;
    const therm = inputs.thermalPractice;
    const sleep = inputs.sleepConcerns;
    const treat = inputs.treatmentInterest;
    const bio = inputs.biohackingInterest;
    const med = inputs.medicalPartnership;
    const conc = inputs.conciergeInterest;
    const elev = inputs.elevation;
    const dayVar = inputs.daylightVariability;
    const buildAdj = { new_build: 1, renovation: 0, existing: -1 }[build] || 0;

    let air = 5;
    air += { rural: 3, suburban: 1, urban_medium: -1, urban_high: -3 }[ctx] || 0;
    air += buildAdj;
    if (age > 70) air -= 1;

    let water = 5;
    water += build === 'new_build' ? 2 : build === 'existing' ? -1 : 0;
    if (size < 100) water += 1;
    if (size > 800) water -= 1;

    let light = 5;
    if (dayVar != null) {
      if (dayVar > 6) light -= 2;
      else if (dayVar > 4) light -= 1;
      else light += 1;
    }
    light += buildAdj;

    let thermal = 5;
    thermal += therm !== 'none' ? 3 : -1;
    if (build === 'new_build') thermal += 1;
    if (elev != null && elev > 1500) thermal += 1;

    let movement = 5;
    movement += { none: -2, occasional: 0, regular: 1, frequent: 2, athlete: 3 }[move] || 0;
    if (size < 100) movement -= 2;
    if (size > 300) movement += 1;

    let sleepD = 5;
    if (sleep) sleepD -= 3;
    if (build === 'new_build') sleepD += 1;
    if (age > 70) sleepD -= 1;
    if (elev != null && elev > 2000) sleepD -= 1;

    let recovery = 5;
    recovery += { low: -2, moderate: 0, high: 2 }[treat] || 0;
    if (size < 100) recovery -= 1;
    if (conc) recovery += 1;

    let diagnostics = 5;
    diagnostics += { low: -2, moderate: 0, high: 2 }[bio] || 0;
    if (med) diagnostics += 2;
    if (conc) diagnostics += 1;
    if (cv === 'history') diagnostics -= 1;
    if (cv === 'unstable') diagnostics -= 3;

    const clamp = (n) => Math.max(0, Math.min(10, n));
    const scores = {
      air: clamp(air), water: clamp(water), light: clamp(light), thermal: clamp(thermal),
      movement: clamp(movement), sleep: clamp(sleepD), recovery: clamp(recovery), diagnostics: clamp(diagnostics),
    };
    const total = Object.values(scores).reduce((a, b) => a + b, 0);

    const essentialAvg = (scores.air + scores.water + scores.light) / 3;
    const signatureAvg = (scores.thermal + scores.movement + scores.sleep + scores.recovery) / 4;
    let primary = 'Essential';
    if (essentialAvg >= 7 && signatureAvg < 7) primary = 'Signature';
    else if (essentialAvg >= 7 && signatureAvg >= 6 && (bio !== 'low' || med || conc)) primary = 'Ultra';
    if (bio === 'high' && med) primary = 'Ultra';

    return { scores, total, primary };
  }, [inputs]);

  async function submitForm() {
    if (!inputs.name.trim() || !inputs.email.trim()) {
      setSubmitState({ status: 'error', message: t('intake_err_required') });
      return;
    }
    if (!inputs.email.includes('@')) {
      setSubmitState({ status: 'error', message: t('intake_err_email') });
      return;
    }
    setSubmitState({ status: 'submitting' });
    const data = {
      'form-name': 'vallat-evolution-intake',
      lang,
      name: inputs.name,
      email: inputs.email,
      phone: inputs.phone,
      vallatReference: inputs.vallatReference,
      propertyRegion: inputs.propertyRegion,
      consultationWindow: inputs.consultationWindow,
      notes: inputs.notes,
      address: address || '(not provided)',
      locationContext: inputs.locationContext,
      elevation: inputs.elevation != null ? String(inputs.elevation) : '',
      daylightVariability: inputs.daylightVariability != null ? inputs.daylightVariability.toFixed(2) : '',
      propertyType: inputs.propertyType,
      propertySize: String(inputs.propertySize),
      occupantMaxAge: String(inputs.occupantMaxAge),
      cvHistory: inputs.cvHistory,
      movementFrequency: inputs.movementFrequency,
      thermalPractice: inputs.thermalPractice,
      sleepConcerns: String(inputs.sleepConcerns),
      treatmentInterest: inputs.treatmentInterest,
      biohackingInterest: inputs.biohackingInterest,
      medicalPartnership: String(inputs.medicalPartnership),
      conciergeInterest: String(inputs.conciergeInterest),
      totalScore: String(domainScores.total),
      primaryTier: domainScores.primary,
      domainScores: JSON.stringify(domainScores.scores),
    };
    try {
      const resp = await fetch('/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(data).toString(),
      });
      if (resp.ok) setSubmitState({ status: 'success' });
      else setSubmitState({ status: 'error', message: t('intake_err_network') });
    } catch (e) {
      setSubmitState({ status: 'error', message: t('intake_err_network') });
    }
  }

  return (
    <div style={{ minHeight: '100vh', background: C.bg, padding: '24px 48px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 48, paddingBottom: 24, borderBottom: `1px solid ${C.rule}` }}>
        <div>
          <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 16, letterSpacing: '0.22em' }}>
            VALLAT <span style={{ fontStyle: 'italic', color: C.inkSofter, letterSpacing: '0.005em', textTransform: 'none' }}>Evolution</span>
          </div>
          <div style={{ fontSize: 9, letterSpacing: '0.18em', color: C.inkSofter, textTransform: 'uppercase', marginTop: 2, fontStyle: 'italic', fontFamily: "'Instrument Serif', serif" }}>{t('assess_label')}</div>
        </div>
        <div style={{ display: 'flex', gap: 24, alignItems: 'center' }}>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <button onClick={() => setLang('en')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 11, letterSpacing: '0.18em', color: lang === 'en' ? C.ink : C.inkSofter, fontWeight: lang === 'en' ? 600 : 400 }}>EN</button>
            <span style={{ color: C.inkSofter, fontSize: 10 }}>·</span>
            <button onClick={() => setLang('fr')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 11, letterSpacing: '0.18em', color: lang === 'fr' ? C.ink : C.inkSofter, fontWeight: lang === 'fr' ? 600 : 400 }}>FR</button>
          </div>
          <div style={{ fontSize: 11, letterSpacing: '0.16em', textTransform: 'uppercase', color: C.inkSoft }}>{t('assess_step_n_of')} {step} / 4</div>
          <button onClick={onClose} style={{ background: 'transparent', border: `1px solid ${C.ink}`, color: C.ink, padding: '8px 18px', fontSize: 11, letterSpacing: '0.16em', textTransform: 'uppercase', cursor: 'pointer' }}>{t('assess_back')}</button>
        </div>
      </div>

      <div style={{ maxWidth: 980, margin: '0 auto' }}>
        <div style={{ display: 'flex', gap: 4, marginBottom: 48 }}>
          {[1,2,3,4].map(s => (
            <div key={s} style={{ flex: 1, height: 2, background: s <= step ? C.ink : C.rule }} />
          ))}
        </div>

        {step === 1 && (
          <div>
            <div style={{ fontSize: 11, letterSpacing: '0.24em', color: C.accent, textTransform: 'uppercase', marginBottom: 16 }}>{t('s1_eyebrow')}</div>
            <h1 style={{ fontFamily: "'Instrument Serif', serif", fontSize: 56, fontWeight: 300, lineHeight: 1.02, letterSpacing: '-0.02em', margin: 0, marginBottom: 24 }}>
              {t('s1_h1_l1')}<br /><span style={{ fontStyle: 'italic', color: C.inkSofter }}>{t('s1_h1_l2')}</span>
            </h1>
            <p style={{ fontSize: 16, color: C.inkSoft, lineHeight: 1.6, marginBottom: 40, maxWidth: 580 }}>{t('s1_body')}</p>
            <div style={{ background: C.ink, color: C.bg, padding: 36, marginBottom: 32 }}>
              <label style={{ fontSize: 10, letterSpacing: '0.22em', color: C.accent, textTransform: 'uppercase' }}>{t('s1_addr_label')}</label>
              <input type="text" value={address} onChange={e => setAddress(e.target.value)} onKeyDown={e => e.key === 'Enter' && runLookup()}
                placeholder={t('s1_addr_placeholder')}
                style={{ width: '100%', padding: '12px 0', marginTop: 10, background: 'transparent', border: 'none', borderBottom: `1px solid rgba(244,239,230,0.3)`, color: C.bg, fontSize: 18, fontFamily: 'inherit', outline: 'none' }} />
              <button onClick={runLookup} disabled={lookup.loading || !address.trim()}
                style={{ width: '100%', marginTop: 24, padding: 14, background: C.accent, color: C.ink, border: 'none', fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase', fontWeight: 600, cursor: lookup.loading || !address.trim() ? 'not-allowed' : 'pointer', opacity: lookup.loading || !address.trim() ? 0.5 : 1 }}>
                {lookup.loading ? t('s1_btn_loading') : t('s1_btn_idle')}
              </button>
              {lookup.result?.success && (
                <div style={{ marginTop: 24, paddingTop: 20, borderTop: `1px solid rgba(184,134,11,0.3)` }}>
                  <div style={{ fontSize: 9, letterSpacing: '0.2em', color: C.accent, textTransform: 'uppercase' }}>{t('s1_resolved')}</div>
                  <div style={{ fontSize: 13, marginTop: 4 }}>{lookup.result.geo.displayName}</div>
                  {lookup.result.air?.pm25 != null && (
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 16, marginTop: 16 }}>
                      <div><div style={{ fontSize: 9, letterSpacing: '0.16em', color: C.accent, textTransform: 'uppercase' }}>PM2.5</div><div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 22, marginTop: 4 }}>{lookup.result.air.pm25.toFixed(1)}<span style={{ fontSize: 11, color: 'rgba(244,239,230,0.6)' }}> µg/m³</span></div></div>
                      {lookup.result.air.no2 != null && <div><div style={{ fontSize: 9, letterSpacing: '0.16em', color: C.accent, textTransform: 'uppercase' }}>NO₂</div><div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 22, marginTop: 4 }}>{lookup.result.air.no2.toFixed(1)}<span style={{ fontSize: 11, color: 'rgba(244,239,230,0.6)' }}> µg/m³</span></div></div>}
                      {lookup.result.air.aqi != null && <div><div style={{ fontSize: 9, letterSpacing: '0.16em', color: C.accent, textTransform: 'uppercase' }}>EU AQI</div><div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 22, marginTop: 4 }}>{lookup.result.air.aqi.toFixed(0)}</div></div>}
                    </div>
                  )}
                  {lookup.result.place && (
                    <div style={{ marginTop: 18, paddingTop: 14, borderTop: `1px dashed rgba(184,134,11,0.3)` }}>
                      <div style={{ fontSize: 9, letterSpacing: '0.2em', color: C.accent, textTransform: 'uppercase', marginBottom: 8 }}>{t('s1_place')}</div>
                      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 16 }}>
                        {lookup.result.place.elevation != null && (
                          <div>
                            <div style={{ fontSize: 9, letterSpacing: '0.16em', color: C.accent, textTransform: 'uppercase' }}>{t('s1_elev')}</div>
                            <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 22, marginTop: 4 }}>{lookup.result.place.elevation}<span style={{ fontSize: 11, color: 'rgba(244,239,230,0.6)' }}> m</span></div>
                          </div>
                        )}
                        {lookup.result.place.daylight && (
                          <div>
                            <div style={{ fontSize: 9, letterSpacing: '0.16em', color: C.accent, textTransform: 'uppercase' }}>{t('s1_daylight_today')}</div>
                            <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 22, marginTop: 4 }}>{formatHours(lookup.result.place.daylight.today)}</div>
                          </div>
                        )}
                        {lookup.result.place.daylight && (
                          <div>
                            <div style={{ fontSize: 9, letterSpacing: '0.16em', color: C.accent, textTransform: 'uppercase' }}>{t('s1_daylight_range')}</div>
                            <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 22, marginTop: 4 }}>{formatHours(lookup.result.place.daylight.shortest)}<span style={{ fontSize: 11, color: 'rgba(244,239,230,0.6)' }}>–</span>{formatHours(lookup.result.place.daylight.longest)}</div>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                  <div style={{ marginTop: 16, paddingTop: 12, borderTop: `1px dashed rgba(184,134,11,0.3)` }}>
                    <div style={{ fontSize: 9, letterSpacing: '0.2em', color: C.accent, textTransform: 'uppercase' }}>{t('s1_classified')}</div>
                    <div style={{ fontSize: 14, marginTop: 4, fontWeight: 500 }}>{contextLabel(lookup.result.classification.context, t)}</div>
                    <div style={{ fontSize: 11, color: C.accent, fontStyle: 'italic', marginTop: 2 }}>{lookup.result.classification.source}</div>
                  </div>
                </div>
              )}
            </div>
            <button onClick={() => setStep(2)} style={btnPrimary}>{t('assess_continue')}</button>
          </div>
        )}

        {step === 2 && (
          <div>
            <div style={{ fontSize: 11, letterSpacing: '0.24em', color: C.accent, textTransform: 'uppercase', marginBottom: 16 }}>{t('s2_eyebrow')}</div>
            <h1 style={{ fontFamily: "'Instrument Serif', serif", fontSize: 56, fontWeight: 300, lineHeight: 1.02, letterSpacing: '-0.02em', margin: 0, marginBottom: 32 }}>
              {t('s2_h1_l1')}<br /><span style={{ fontStyle: 'italic', color: C.inkSofter }}>{t('s2_h1_l2')}</span>
            </h1>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 28 }}>
              <Field label={t('s2_propType')}>
                <Seg value={inputs.propertyType} onChange={v => update('propertyType', v)} opts={[{value:'new_build',label:t('s2_pt_new')},{value:'renovation',label:t('s2_pt_reno')},{value:'existing',label:t('s2_pt_existing')}]} />
              </Field>
              <Field label={t('s2_size')} sub={`${inputs.propertySize} m²`}>
                <input type="range" min={50} max={1500} step={50} value={inputs.propertySize} onChange={e => update('propertySize', parseInt(e.target.value))} style={rangeStyle} />
              </Field>
              <Field label={t('s2_age')} sub={`${inputs.occupantMaxAge} ${t('s2_age_unit')}`}>
                <input type="range" min={20} max={90} value={inputs.occupantMaxAge} onChange={e => update('occupantMaxAge', parseInt(e.target.value))} style={rangeStyle} />
              </Field>
              <Field label={t('s2_cv')}>
                <Seg value={inputs.cvHistory} onChange={v => update('cvHistory', v)} opts={[{value:'none',label:t('s2_cv_none')},{value:'history',label:t('s2_cv_history')},{value:'unstable',label:t('s2_cv_unstable')}]} />
              </Field>
            </div>
            <div style={{ marginTop: 40, display: 'flex', gap: 12 }}>
              <button onClick={() => setStep(1)} style={btnSecondary}>{t('assess_back_btn')}</button>
              <button onClick={() => setStep(3)} style={btnPrimary}>{t('assess_continue')}</button>
            </div>
          </div>
        )}

        {step === 3 && (
          <div>
            <div style={{ fontSize: 11, letterSpacing: '0.24em', color: C.accent, textTransform: 'uppercase', marginBottom: 16 }}>{t('s3_eyebrow')}</div>
            <h1 style={{ fontFamily: "'Instrument Serif', serif", fontSize: 56, fontWeight: 300, lineHeight: 1.02, letterSpacing: '-0.02em', margin: 0, marginBottom: 32 }}>
              {t('s3_h1_l1')}<br /><span style={{ fontStyle: 'italic', color: C.inkSofter }}>{t('s3_h1_l2')}</span>
            </h1>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 28 }}>
              <Field label={t('s3_move')}>
                <Seg value={inputs.movementFrequency} onChange={v => update('movementFrequency', v)} opts={[{value:'none',label:t('s3_move_none')},{value:'occasional',label:t('s3_move_occ')},{value:'regular',label:t('s3_move_reg')},{value:'frequent',label:t('s3_move_freq')},{value:'athlete',label:t('s3_move_athlete')}]} />
              </Field>
              <Field label={t('s3_therm')}>
                <Seg value={inputs.thermalPractice} onChange={v => update('thermalPractice', v)} opts={[{value:'none',label:t('s3_th_none')},{value:'sauna',label:t('s3_th_sauna')},{value:'cold',label:t('s3_th_cold')},{value:'both',label:t('s3_th_both')}]} />
              </Field>
              <Field label={t('s3_treat')}>
                <Seg value={inputs.treatmentInterest} onChange={v => update('treatmentInterest', v)} opts={[{value:'low',label:t('s3_lvl_low')},{value:'moderate',label:t('s3_lvl_mod')},{value:'high',label:t('s3_lvl_high')}]} />
              </Field>
              <Field label={t('s3_bio')}>
                <Seg value={inputs.biohackingInterest} onChange={v => update('biohackingInterest', v)} opts={[{value:'low',label:t('s3_lvl_low')},{value:'moderate',label:t('s3_lvl_mod')},{value:'high',label:t('s3_lvl_high')}]} />
              </Field>
              <Toggle label={t('s3_sleep_concerns')} checked={inputs.sleepConcerns} onChange={v => update('sleepConcerns', v)} />
              <Toggle label={t('s3_medical')} checked={inputs.medicalPartnership} onChange={v => update('medicalPartnership', v)} />
              <Toggle label={t('s3_concierge')} checked={inputs.conciergeInterest} onChange={v => update('conciergeInterest', v)} />
            </div>
            <div style={{ marginTop: 40, display: 'flex', gap: 12 }}>
              <button onClick={() => setStep(2)} style={btnSecondary}>{t('assess_back_btn')}</button>
              <button onClick={() => setStep(4)} style={btnPrimary}>{t('assess_continue')}</button>
            </div>
          </div>
        )}

        {step === 4 && (
          <div>
            <div style={{ fontSize: 11, letterSpacing: '0.24em', color: C.accent, textTransform: 'uppercase', marginBottom: 16 }}>{t('s4_eyebrow')}</div>
            <h1 style={{ fontFamily: "'Instrument Serif', serif", fontSize: 56, fontWeight: 300, lineHeight: 1.02, letterSpacing: '-0.02em', margin: 0, marginBottom: 24 }}>
              {t('s4_h1_l1')}<br /><span style={{ fontStyle: 'italic', color: C.inkSofter }}>{t('s4_h1_l2')}</span>
            </h1>
            <p style={{ fontSize: 15, color: C.inkSoft, lineHeight: 1.65, marginBottom: 40 }}>
              {t('s4_intro_pre')}<span style={{ fontFamily: "'Instrument Serif', serif", fontStyle: 'italic', color: C.ink }}>{t('s4_intro_mark')}</span>{t('s4_intro_post')}
            </p>

            {/* Score panel */}
            <div style={{ background: C.ink, color: C.bg, padding: 48, marginBottom: 24 }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.4fr', gap: 48, alignItems: 'center', marginBottom: 40, paddingBottom: 32, borderBottom: `1px solid rgba(244,239,230,0.18)` }}>
                <div>
                  <div style={{ fontSize: 10, letterSpacing: '0.22em', textTransform: 'uppercase', color: C.accent, marginBottom: 12 }}>{t('s4_score_label')}</div>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 12 }}>
                    <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 140, fontWeight: 400, letterSpacing: '-0.04em', lineHeight: 0.9, color: C.bg }}>{domainScores.total}</div>
                    <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 32, color: 'rgba(244,239,230,0.5)' }}>/ 80</div>
                  </div>
                  <div style={{ fontFamily: "'Instrument Serif', serif", fontStyle: 'italic', fontSize: 13, color: 'rgba(244,239,230,0.6)', marginTop: 12, maxWidth: 280, lineHeight: 1.5 }}>{t('s4_score_caption')}</div>
                </div>
                <div style={{ borderLeft: `1px solid rgba(244,239,230,0.2)`, paddingLeft: 40 }}>
                  <div style={{ fontSize: 10, letterSpacing: '0.22em', textTransform: 'uppercase', color: C.accent, marginBottom: 12 }}>{t('s4_tier_label')}</div>
                  <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 56, fontWeight: 300, letterSpacing: '-0.02em', lineHeight: 1, marginBottom: 16 }}>{domainScores.primary}</div>
                  <div style={{ fontSize: 13, color: 'rgba(244,239,230,0.7)', lineHeight: 1.6, maxWidth: 360 }}>
                    {domainScores.primary === 'Essential' && t('s4_tier_essential')}
                    {domainScores.primary === 'Signature' && t('s4_tier_signature')}
                    {domainScores.primary === 'Ultra' && t('s4_tier_ultra')}
                  </div>
                </div>
              </div>
              <div style={{ fontSize: 10, letterSpacing: '0.22em', textTransform: 'uppercase', color: C.accent, marginBottom: 20 }}>{t('s4_eight_label')}</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '14px 48px' }}>
                {[
                  { key: 'air',         num: '01', labelKey: 'domain_air_title' },
                  { key: 'water',       num: '02', labelKey: 'domain_water_title' },
                  { key: 'light',       num: '03', labelKey: 'domain_light_title' },
                  { key: 'thermal',     num: '04', labelKey: 'domain_thermal_title' },
                  { key: 'movement',    num: '05', labelKey: 'domain_movement_title' },
                  { key: 'sleep',       num: '06', labelKey: 'domain_sleep_title' },
                  { key: 'recovery',    num: '07', labelKey: 'domain_recovery_title' },
                  { key: 'diagnostics', num: '08', labelKey: 'domain_diagnostics_title' },
                ].map((d) => {
                  const score = domainScores.scores[d.key];
                  const low = score <= 4;
                  return (
                    <div key={d.key}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
                        <div style={{ display: 'flex', gap: 10, alignItems: 'baseline' }}>
                          <span style={{ fontFamily: "'Instrument Serif', serif", fontStyle: 'italic', fontSize: 12, color: C.accent }}>— {d.num}</span>
                          <span style={{ fontSize: 12, letterSpacing: '0.04em', color: low ? C.accent : 'rgba(244,239,230,0.85)' }}>{t(d.labelKey)}</span>
                        </div>
                        <span style={{ fontFamily: "'Instrument Serif', serif", fontSize: 16, color: low ? C.accent : C.bg }}>{score}<span style={{ fontSize: 11, color: 'rgba(244,239,230,0.5)' }}>/10</span></span>
                      </div>
                      <div style={{ height: 2, background: 'rgba(244,239,230,0.12)' }}>
                        <div style={{ height: 2, width: `${(score/10)*100}%`, background: low ? C.accent : 'rgba(244,239,230,0.6)', transition: 'width 0.3s ease' }} />
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{ marginTop: 24, fontSize: 11, fontStyle: 'italic', fontFamily: "'Instrument Serif', serif", color: 'rgba(244,239,230,0.5)', lineHeight: 1.5 }}>
                {t('s4_legend_pre')}<span style={{ color: C.accent }}>{t('s4_legend_brass')}</span>{t('s4_legend_post')}
              </div>
            </div>
            <div style={{ fontSize: 11, color: C.inkSofter, fontStyle: 'italic', fontFamily: "'Instrument Serif', serif", marginBottom: 40, lineHeight: 1.6 }}>{t('s4_footnote')}</div>

            {/* Intake — Vallat-specific data captured AFTER score */}
            {submitState.status === 'success' ? (
              <div style={{ background: C.bgDeep, padding: '48px 40px' }}>
                <div style={{ fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase', color: C.accent, marginBottom: 16 }}>{t('intake_success_eyebrow')}</div>
                <h3 style={{ fontFamily: "'Instrument Serif', serif", fontSize: 28, lineHeight: 1.25, fontWeight: 400, margin: 0, marginBottom: 14 }}>{t('intake_success_h2')}</h3>
                <p style={{ fontSize: 14, lineHeight: 1.65, color: C.inkSoft, margin: 0, marginBottom: 28 }}>{t('intake_success_body')}</p>
                <button onClick={onClose} style={btnSecondary}>{t('intake_return')}</button>
              </div>
            ) : (
              <div style={{ background: C.bgDeep, padding: '40px' }}>
                <div style={{ fontSize: 11, letterSpacing: '0.24em', textTransform: 'uppercase', color: C.accent, marginBottom: 16 }}>{t('intake_eyebrow')}</div>
                <h3 style={{ fontFamily: "'Instrument Serif', serif", fontSize: 'clamp(28px, 3.2vw, 40px)', fontWeight: 300, lineHeight: 1.1, margin: 0, marginBottom: 16 }}>
                  {t('intake_h2_pre')}<span style={{ fontStyle: 'italic', color: C.inkSofter }}>{t('intake_h2_italic')}</span>
                </h3>
                <p style={{ fontSize: 14, lineHeight: 1.65, color: C.inkSoft, marginBottom: 32, maxWidth: 600 }}>{t('intake_body')}</p>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '28px 32px' }}>
                  <Field label={t('intake_name')}>
                    <input type="text" value={inputs.name} onChange={e => update('name', e.target.value)} style={inlineInput} />
                  </Field>
                  <Field label={t('intake_email')}>
                    <input type="email" value={inputs.email} onChange={e => update('email', e.target.value)} style={inlineInput} />
                  </Field>
                  <Field label={t('intake_ref')} help={t('intake_ref_help')}>
                    <input type="text" value={inputs.vallatReference} onChange={e => update('vallatReference', e.target.value)} style={inlineInput} />
                  </Field>
                  <Field label={t('intake_phone')}>
                    <input type="text" value={inputs.phone} onChange={e => update('phone', e.target.value)} style={inlineInput} />
                  </Field>
                  <Field label={t('intake_region')}>
                    <select value={inputs.propertyRegion} onChange={e => update('propertyRegion', e.target.value)} style={inlineInput}>
                      <option value="Geneva">{t('intake_region_geneva')}</option>
                      <option value="French / Swiss Alps">{t('intake_region_alps')}</option>
                      <option value="Côte d'Azur">{t('intake_region_cotedazur')}</option>
                      <option value="Other">{t('intake_region_other')}</option>
                    </select>
                  </Field>
                  <Field label={t('intake_window')}>
                    <select value={inputs.consultationWindow} onChange={e => update('consultationWindow', e.target.value)} style={inlineInput}>
                      <option value="As soon as possible">{t('intake_window_asap')}</option>
                      <option value="Within 4 weeks">{t('intake_window_4w')}</option>
                      <option value="Within the next quarter">{t('intake_window_quarter')}</option>
                      <option value="Later — to be agreed">{t('intake_window_later')}</option>
                    </select>
                  </Field>
                  <div style={{ gridColumn: '1 / -1' }}>
                    <Field label={t('intake_notes')}>
                      <textarea value={inputs.notes} onChange={e => update('notes', e.target.value)} placeholder={t('intake_notes_ph')} rows={3} style={{ ...inlineInput, resize: 'vertical' }} />
                    </Field>
                  </div>
                </div>
                <button onClick={submitForm} disabled={submitState.status === 'submitting'}
                  style={{ marginTop: 32, padding: '16px 32px', background: C.ink, color: C.bg, border: 'none', fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase', fontWeight: 500, cursor: submitState.status === 'submitting' ? 'not-allowed' : 'pointer', opacity: submitState.status === 'submitting' ? 0.5 : 1 }}>
                  {submitState.status === 'submitting' ? t('intake_submit_busy') : t('intake_submit')}
                </button>
                {submitState.status === 'error' && (
                  <div style={{ marginTop: 16, fontSize: 12, color: C.accent, fontStyle: 'italic', fontFamily: "'Instrument Serif', serif" }}>{submitState.message}</div>
                )}
              </div>
            )}

            <div style={{ marginTop: 24, display: 'flex', gap: 12 }}>
              <button onClick={() => setStep(3)} style={btnSecondary}>{t('assess_back_btn')}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── UI primitives ───
const btnPrimary = { padding: '16px 28px', background: C.ink, color: C.bg, border: 'none', fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase', fontWeight: 500, cursor: 'pointer' };
const btnSecondary = { padding: '16px 28px', background: 'transparent', color: C.ink, border: `1px solid ${C.ink}`, fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase', fontWeight: 500, cursor: 'pointer' };
const rangeStyle = { width: '100%', accentColor: C.ink };
const inlineInput = {
  width: '100%', padding: '12px 0', background: 'transparent',
  border: 'none', borderBottom: `1px solid ${C.ink}`,
  fontSize: 15, fontFamily: 'inherit', outline: 'none', color: C.ink,
};

function Field({ label, sub, help, children }) {
  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 10 }}>
        <label style={{ fontSize: 11, letterSpacing: '0.16em', textTransform: 'uppercase', color: C.ink, fontWeight: 500 }}>{label}</label>
        {sub && <span style={{ fontSize: 13, color: C.accent, fontStyle: 'italic', fontFamily: "'Instrument Serif', serif" }}>{sub}</span>}
      </div>
      {children}
      {help && <div style={{ fontSize: 11, color: C.inkSofter, fontStyle: 'italic', fontFamily: "'Instrument Serif', serif", marginTop: 4 }}>{help}</div>}
    </div>
  );
}
function Seg({ value, onChange, opts }) {
  return (
    <div style={{ display: 'flex', border: `1px solid ${C.rule}`, flexWrap: 'wrap' }}>
      {opts.map((o, i) => {
        const active = value === o.value;
        return (
          <button key={o.value} onClick={() => onChange(o.value)} style={{
            flex: 1, padding: 12, background: active ? C.ink : 'transparent', color: active ? C.bg : C.ink,
            border: 'none', borderLeft: i > 0 ? `1px solid ${C.rule}` : 'none',
            fontSize: 12, letterSpacing: '0.04em', cursor: 'pointer',
          }}>{o.label}</button>
        );
      })}
    </div>
  );
}
function Toggle({ label, checked, onChange }) {
  return (
    <button onClick={() => onChange(!checked)} style={{ width: '100%', display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', background: 'transparent', border: 'none', cursor: 'pointer' }}>
      <span style={{ fontSize: 14, color: C.ink, textAlign: 'left' }}>{label}</span>
      <div style={{ position: 'relative', width: 40, height: 22, background: checked ? C.ink : 'rgba(28,26,23,0.15)', borderRadius: 999, transition: 'background 0.2s', flexShrink: 0, marginLeft: 16 }}>
        <div style={{ position: 'absolute', top: 2, left: checked ? 20 : 2, width: 18, height: 18, background: C.bg, borderRadius: 999, transition: 'left 0.2s' }} />
      </div>
    </button>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
setTimeout(() => {
  const l = document.getElementById('loading');
  if (l) { l.classList.add('hide'); setTimeout(() => l.remove(), 400); }
}, 100);
  </script>
</body>
</html>
